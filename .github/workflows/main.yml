name: Build NBIS dwsq

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget libpng-dev zlib1g-dev
    
    - name: Download NBIS as ZIP
      run: |
        cd /tmp
        wget -O NBIS.zip https://github.com/usnistgov/NBIS/archive/refs/heads/master.zip
        unzip -q NBIS.zip
        ls -la
        mv NBIS-master NBIS
    
    - name: Build NBIS
      run: |
        cd /tmp/NBIS
        make it
    
    - name: Find and copy dwsq
      run: |
        find /tmp/NBIS -name "dwsq" -type f -executable
        cp /tmp/NBIS/bin/dwsq ./dwsq
        chmod +x ./dwsq
        file ./dwsq
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: NBIS dwsq v1.0.${{ github.run_number }}
        body: Automated NBIS dwsq binary build
        draft: false
        prerelease: false
    
    - name: Upload dwsq binary
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dwsq
        asset_name: dwsq
        asset_content_type: application/octet-stream
