name: Debug Build

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: Check network
      run: |
        echo "Testing GitHub connectivity..."
        ping -c 1 github.com || echo "PING failed"
        curl -I https://api.github.com || echo "CURL failed"
        
    - uses: actions/checkout@v3
      
    - name: Simple test
      run: |
        echo "Build test successful!"
        ls -la
